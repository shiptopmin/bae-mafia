<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🌙 마피아</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;user-select:none;-webkit-user-select:none}
:root{
  --bg:#0a0a14;--surface:#12121f;--surface2:#1a1a2e;
  --accent:#e94560;--text:#e8e8f0;--dim:#5a5a7a;
  --success:#27ae60;--warn:#e67e22;--border:#1e1e35;
  --mafia:#e94560;--police:#3498db;--doctor:#27ae60;--citizen:#7f8c8d;
  --night:#7c3aed;--day:#d97706;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow-x:hidden}
.page{display:none;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto;padding:16px}
.page.active{display:flex}
.hdr{text-align:center;padding:24px 0 18px}
.hdr-icon{font-size:44px;line-height:1;margin-bottom:6px}
.hdr h1{font-size:28px;font-weight:900;letter-spacing:3px;color:var(--accent)}
.hdr-sub{color:var(--dim);font-size:12px;margin-top:5px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:14px}
.card-title{font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px}
.inp{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;color:var(--text);font-size:16px;outline:none;user-select:text;-webkit-user-select:text}
.inp:focus{border-color:var(--accent)}
.inp::placeholder{color:var(--dim)}
.inp-row{display:flex;gap:10px;margin-bottom:12px}
.inp-row .inp{flex:1}
.btn{width:100%;padding:16px;border-radius:14px;border:none;font-size:16px;font-weight:800;cursor:pointer;letter-spacing:.3px;transition:opacity .15s,transform .15s;margin-bottom:10px}
.btn:active{transform:scale(.96);opacity:.8}
.btn:last-child{margin-bottom:0}
.btn-red{background:linear-gradient(135deg,#e94560,#c0392b);color:#fff}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-outline{background:transparent;color:var(--accent);border:2px solid var(--accent)}
.btn-blue{background:linear-gradient(135deg,#2980b9,#1a5276);color:#fff}
.btn-green{background:linear-gradient(135deg,#27ae60,#1e8449);color:#fff}
.btn-purple{background:linear-gradient(135deg,#7c3aed,#5b21b6);color:#fff}
.btn-sm{padding:10px 16px;font-size:14px;border-radius:10px;width:auto;margin:0}
.btn:disabled{opacity:.3;cursor:default;transform:none}
.room-code{font-size:48px;font-weight:900;letter-spacing:8px;text-align:center;color:var(--accent);padding:14px 0;font-variant-numeric:tabular-nums}
.player-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)}
.player-item:last-child{border-bottom:none}
.player-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0}
.player-name{flex:1;font-size:15px;font-weight:600}
.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
.reveal-box{min-height:155px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:var(--surface2);border-radius:16px;padding:22px;border:2px solid var(--border);transition:border-color .2s;text-align:center}
.reveal-role{font-size:36px;font-weight:900;letter-spacing:2px}
.reveal-desc{font-size:13px;color:var(--dim);line-height:1.7;margin-top:2px}
.hold-btn{width:100%;padding:20px;border-radius:16px;border:2px solid var(--accent);background:transparent;color:var(--accent);font-size:16px;font-weight:800;cursor:pointer;text-align:center;transition:background .1s,color .1s;margin:12px 0}
.hold-btn.on{background:var(--accent);color:#fff}
.phase-bar{display:flex;align-items:center;justify-content:center;gap:10px;padding:12px 0 6px}
.phase-icon{font-size:26px}
.phase-lbl{font-size:20px;font-weight:900}
.night-clr{color:var(--night)}
.day-clr{color:var(--day)}
.guide{background:var(--surface2);border-radius:14px;padding:15px;margin-bottom:12px;font-size:14px;line-height:1.85;color:var(--dim)}
.guide strong{color:var(--text)}
.sel-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}
.sel-btn{padding:13px 6px;border-radius:12px;border:2px solid var(--border);background:transparent;color:var(--dim);font-size:13px;font-weight:700;cursor:pointer;text-align:center;transition:all .12s;word-break:break-all;line-height:1.3}
.sel-btn.picked{color:#fff}
.sel-btn:disabled{opacity:.3;cursor:default}
.confirm-btn{width:100%;padding:14px;border-radius:12px;border:none;font-size:15px;font-weight:800;cursor:pointer;margin-top:6px;color:#fff}
.confirm-btn:disabled{opacity:.3;cursor:default}
.result-box{padding:15px;border-radius:12px;background:var(--surface2);font-size:15px;font-weight:700;text-align:center;margin:10px 0;min-height:50px;display:flex;align-items:center;justify-content:center;color:var(--dim);line-height:1.5}
.vote-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:10px 0}
.vote-btn{padding:15px 8px;border-radius:13px;border:2px solid var(--border);background:transparent;color:var(--text);font-size:14px;font-weight:700;cursor:pointer;text-align:center;transition:all .12s}
.vote-btn.my-vote{border-color:var(--accent);background:#e9456018}
.vote-btn:disabled{opacity:.3;cursor:default}
.exec-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:12px 0}
.exec-btn{padding:18px;border-radius:14px;border:2px solid var(--border);background:transparent;font-size:18px;font-weight:900;cursor:pointer;text-align:center;transition:all .12s}
.exec-btn.yes{border-color:var(--mafia);color:var(--mafia)}
.exec-btn.yes.picked{background:var(--mafia);color:#fff}
.exec-btn.no{border-color:var(--police);color:var(--police)}
.exec-btn.no.picked{background:var(--police);color:#fff}
.exec-btn:disabled{opacity:.3;cursor:default}
.vote-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);font-size:14px}
.vote-row:last-child{border-bottom:none}
.announce{padding:18px;border-radius:16px;margin-bottom:12px;text-align:center}
.announce.kill{background:#e9456015;border:1px solid var(--mafia)}
.announce.save{background:#27ae6015;border:1px solid var(--doctor)}
.announce.none{background:var(--surface2);border:1px solid var(--border)}
.sv-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)}
.sv-item:last-child{border-bottom:none}
.sv-item.dead{opacity:.35}
.sv-name{flex:1;font-size:15px;font-weight:600}
.timer-wrap{display:flex;align-items:center;gap:12px;background:var(--surface2);border-radius:14px;padding:13px 16px;margin-bottom:12px}
.t-lbl{font-size:10px;color:var(--dim);margin-bottom:2px;font-weight:600;text-transform:uppercase;letter-spacing:1px}
.t-disp{font-size:30px;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:2px}
.t-running{color:var(--day)}
.t-urgent{color:var(--accent);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.t-btns{display:flex;gap:8px;margin-left:auto}
.t-btn{padding:8px 13px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;font-weight:700;cursor:pointer}
.t-start{background:var(--success);color:#fff;border-color:var(--success)}
.t-stop{background:var(--accent);color:#fff;border-color:var(--accent)}
.win-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px;text-align:center}
.win-emoji{font-size:88px;line-height:1;margin-bottom:16px}
.win-title{font-size:36px;font-weight:900;margin-bottom:8px}
.win-sub{font-size:15px;color:var(--dim);margin-bottom:28px}
.waiting-dot{display:inline-block;animation:bounce .8s infinite}
.waiting-dot:nth-child(2){animation-delay:.15s}
.waiting-dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.role-cell{background:var(--surface2);border-radius:14px;padding:14px}
.role-cell-lbl{font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;margin-bottom:10px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.role-adj{display:flex;align-items:center;justify-content:space-between}
.adj-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.adj-num{font-size:24px;font-weight:800;min-width:30px;text-align:center}
.scroll{overflow-y:auto;flex:1}
.sep{height:1px;background:var(--border);margin:12px 0}
.dim{color:var(--dim)}
.center{text-align:center}
.mafia-consensus{padding:12px;border-radius:12px;background:#e9456012;border:1px solid #e9456040;font-size:13px;color:var(--dim);margin-bottom:10px;line-height:1.7}
</style>
</head>
<body>

<!-- LOBBY -->
<div id="p-lobby" class="page active">
  <div class="hdr"><div class="hdr-icon">🌙</div><h1>MAFIA</h1><div class="hdr-sub">멀티플레이어 · 각자 폰으로</div></div>
  <div class="card">
    <div class="card-title">✏️ 내 닉네임</div>
    <input class="inp" id="inp-nick" type="text" maxlength="8" placeholder="닉네임 입력 (최대 8자)">
  </div>
  <button class="btn btn-red" id="btn-create">🏠 방 만들기</button>
  <div style="text-align:center;color:var(--dim);font-size:13px;margin:2px 0 10px">또는</div>
  <div class="card">
    <div class="card-title">🔑 방 코드로 입장</div>
    <div class="inp-row">
      <input class="inp" id="inp-code" type="text" maxlength="4" placeholder="4자리 코드" style="text-transform:uppercase;letter-spacing:4px;font-weight:800;font-size:18px">
      <button class="btn btn-blue btn-sm" id="btn-join">입장</button>
    </div>
  </div>
  <div id="lobby-msg" style="text-align:center;color:var(--accent);font-size:13px;min-height:20px"></div>
</div>

<!-- WAIT ROOM -->
<div id="p-wait" class="page">
  <div style="padding-top:16px;flex:1;display:flex;flex-direction:column">
    <div class="center" style="margin-bottom:14px">
      <div style="font-size:12px;color:var(--dim);margin-bottom:4px">방 코드</div>
      <div class="room-code" id="wait-code"></div>
      <div style="font-size:12px;color:var(--dim)">친구들에게 이 코드를 알려주세요</div>
    </div>
    <div class="card" style="flex:1">
      <div class="card-title">👥 참가자 <span id="wait-count">0</span>명</div>
      <div id="wait-players"></div>
    </div>
    <div id="host-settings" style="display:none">
      <div class="card">
        <div class="card-title">⚖️ 역할 배분</div>
        <div class="role-grid" id="host-role-grid"></div>
        <div class="sep"></div>
        <div id="host-role-msg" class="dim center" style="font-size:12px"></div>
      </div>
      <button class="btn btn-red" id="btn-game-start">🎮 게임 시작</button>
    </div>
    <div id="guest-waiting" style="display:none;text-align:center;padding:16px 0;color:var(--dim)">
      방장이 게임을 시작하길 기다리는 중<span class="waiting-dot">.</span><span class="waiting-dot">.</span><span class="waiting-dot">.</span>
    </div>
  </div>
</div>

<!-- ROLE REVEAL -->
<div id="p-role" class="page">
  <div style="padding-top:26px;flex:1;display:flex;flex-direction:column">
    <div class="center" style="margin-bottom:18px">
      <div class="dim" style="font-size:13px;margin-bottom:5px">역할이 배정되었습니다</div>
      <div style="font-size:20px;font-weight:800" id="role-nick"></div>
    </div>
    <div class="reveal-box" id="role-reveal-box">
      <div style="font-size:48px">🤫</div>
      <div class="dim" style="font-size:13px;line-height:1.8">아래 버튼을 <strong style="color:var(--text)">꾹 누르는 동안만</strong><br>역할이 표시됩니다</div>
    </div>
    <button class="hold-btn" id="role-hold-btn">👆 꾹 눌러서 역할 확인</button>
    <button class="btn btn-green" id="btn-role-ready">✅ 확인했습니다 — 준비 완료</button>
    <div class="center dim" style="font-size:13px;margin-top:12px" id="role-ready-status"></div>
  </div>
</div>

<!-- GAME -->
<div id="p-game" class="page">
  <div class="phase-bar">
    <span class="phase-icon" id="g-phase-icon"></span>
    <span class="phase-lbl" id="g-phase-lbl"></span>
    <span style="font-size:13px;color:var(--dim);margin-left:6px" id="g-round-lbl"></span>
  </div>
  <div class="scroll" id="g-scroll">
    <div id="g-content"></div>
  </div>
</div>

<!-- WIN -->
<div id="p-win" class="page">
  <div class="win-wrap">
    <div class="win-emoji" id="win-emoji"></div>
    <div class="win-title" id="win-title"></div>
    <div class="win-sub" id="win-sub"></div>
    <div class="card" style="width:100%;margin-bottom:24px" id="win-roles"></div>
    <button class="btn btn-outline" onclick="goLobby()">🔄 처음으로</button>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, get, update, onValue, off, remove } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyDJh_KT19dXRrOQzRn26oyJeg0EvxZ0lOs",
  authDomain: "baefia-8a574.firebaseapp.com",
  databaseURL: "https://baefia-8a574-default-rtdb.firebaseio.com",
  projectId: "baefia-8a574",
  storageBucket: "baefia-8a574.firebasestorage.app",
  messagingSenderId: "786493145702",
  appId: "1:786493145702:web:0c434d23cf4b7e03c323a7"
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ── STATE ─────────────────────────────────────────────────────────────────────
let S = { nick:'', roomCode:'', playerId:'', isHost:false, myRole:'', roles:{마피아:2,의사:1,경찰:1,시민:3}, listeners:[] };
let timer = { sec:300, running:false, iv:null };
let _prevRoomJSON = '';

// ── UTILS ─────────────────────────────────────────────────────────────────────
function page(id){ document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }
function genCode(){ return Math.random().toString(36).slice(2,6).toUpperCase(); }
function genId(){ return Math.random().toString(36).slice(2,10); }
function esc(s){ return String(s).replace(/</g,'&lt;'); }
function clearListeners(){ S.listeners.forEach(fn=>fn()); S.listeners=[]; }
function listen(r,cb){ onValue(r,cb); S.listeners.push(()=>off(r,'value',cb)); }
const COLORS=['#e94560','#3498db','#27ae60','#f39c12','#9b59b6','#1abc9c','#e67e22','#e74c3c'];

// ── SOUND ─────────────────────────────────────────────────────────────────────
let _audio=null;
function startSound(){ try{ const ctx=new(window.AudioContext||window.webkitAudioContext)(),o=ctx.createOscillator(),g=ctx.createGain(); o.type='sine';o.frequency.value=392;g.gain.value=0.06;o.connect(g);g.connect(ctx.destination);o.start();_audio={ctx,o}; }catch(e){} if(navigator.vibrate) navigator.vibrate([40,30,40]); }
function stopSound(){ if(_audio){try{_audio.o.stop();_audio.ctx.close();}catch(e){}_audio=null;} }
function holdBtn(el,onDown,onUp,delay=600){ let t=null; function dn(e){e.preventDefault();el.classList.add('on');startSound();t=setTimeout(onDown,delay);} function up(e){e.preventDefault();el.classList.remove('on');clearTimeout(t);stopSound();onUp();} el.addEventListener('mousedown',dn); el.addEventListener('touchstart',dn,{passive:false}); el.addEventListener('mouseup',up); el.addEventListener('mouseleave',up); el.addEventListener('touchend',up); el.addEventListener('touchcancel',up); }

// ── ROLE CONFIG ───────────────────────────────────────────────────────────────
const ROLE_CFG = {
  마피아:{color:'#e94560',emoji:'🔪',desc:'밤마다 동료와 처형할 사람을 선택하세요.'},
  의사:  {color:'#27ae60',emoji:'💉',desc:'밤마다 1명을 선택해 처형에서 구할 수 있습니다.'},
  경찰:  {color:'#3498db',emoji:'🔵',desc:'밤마다 1명을 조사해 마피아 여부를 확인합니다.'},
  시민:  {color:'#7f8c8d',emoji:'👤',desc:'낮 토론으로 마피아를 찾아 투표로 처형하세요.'},
};
function calcDefaultRoles(n){ const m=Math.max(1,Math.floor(n/3)); const d=n>=4?1:0; const p=n>=5?1:0; return {마피아:m,의사:d,경찰:p,시민:Math.max(0,n-m-d-p)}; }

// ── LOBBY ─────────────────────────────────────────────────────────────────────
function lobbyMsg(m,err=false){ const el=document.getElementById('lobby-msg'); el.textContent=m; el.style.color=err?'var(--accent)':'var(--success)'; }

document.getElementById('btn-create').addEventListener('click',async()=>{
  const nick=document.getElementById('inp-nick').value.trim();
  if(!nick){lobbyMsg('닉네임을 입력하세요',true);return;}
  lobbyMsg('방 생성 중...');
  try{
    S.nick=nick; S.isHost=true; S.playerId=genId(); S.roomCode=genCode();
    await set(ref(db,`rooms/${S.roomCode}`),{ host:S.playerId, status:'waiting', roles:S.roles, players:{[S.playerId]:{nick,host:true,ready:false,alive:true,order:Date.now()}} });
    enterWaitRoom();
  }catch(e){ lobbyMsg('오류: '+e.message,true); }
});

document.getElementById('btn-join').addEventListener('click',async()=>{
  const nick=document.getElementById('inp-nick').value.trim();
  const code=document.getElementById('inp-code').value.trim().toUpperCase();
  if(!nick){lobbyMsg('닉네임을 입력하세요',true);return;}
  if(code.length!==4){lobbyMsg('4자리 코드를 입력하세요',true);return;}
  lobbyMsg('입장 중...');
  try{
    const snap=await get(ref(db,`rooms/${code}`));
    if(!snap.exists()){lobbyMsg('존재하지 않는 방입니다',true);return;}
    const room=snap.val();
    if(room.status!=='waiting'){lobbyMsg('이미 시작된 게임입니다',true);return;}
    S.nick=nick; S.isHost=false; S.playerId=genId(); S.roomCode=code; S.roles=room.roles||S.roles;
    await set(ref(db,`rooms/${code}/players/${S.playerId}`),{nick,host:false,ready:false,alive:true,order:Date.now()});
    enterWaitRoom();
  }catch(e){ lobbyMsg('오류: '+e.message,true); }
});

// ── WAIT ROOM ─────────────────────────────────────────────────────────────────
function enterWaitRoom(){
  page('p-wait');
  document.getElementById('wait-code').textContent=S.roomCode;
  document.getElementById('host-settings').style.display=S.isHost?'':'none';
  document.getElementById('guest-waiting').style.display=S.isHost?'none':'';
  if(S.isHost) renderHostRoleGrid();

  listen(ref(db,`rooms/${S.roomCode}/players`),snap=>{
    if(!snap.exists()) return;
    const players=snap.val();
    renderWaitPlayers(players);
    if(S.isHost){ S.roles=calcDefaultRoles(Object.keys(players).length); renderHostRoleGrid(); }
  });
  listen(ref(db,`rooms/${S.roomCode}/status`),snap=>{ if(snap.val()==='started') enterRoleReveal(); });
  window.addEventListener('beforeunload',()=>{ remove(ref(db,`rooms/${S.roomCode}/players/${S.playerId}`)); });
}

function renderWaitPlayers(players){
  const sorted=Object.entries(players).sort((a,b)=>a[1].order-b[1].order);
  document.getElementById('wait-count').textContent=sorted.length;
  const list=document.getElementById('wait-players');
  list.innerHTML='';
  sorted.forEach(([id,p],i)=>{
    const el=document.createElement('div'); el.className='player-item';
    el.innerHTML=`<div class="player-avatar" style="background:${COLORS[i%COLORS.length]}22;color:${COLORS[i%COLORS.length]}">${esc(p.nick[0])}</div><span class="player-name">${esc(p.nick)}</span>${p.host?'<span class="badge" style="background:#7c3aed22;color:#7c3aed">방장</span>':''}${id===S.playerId?'<span class="badge" style="background:#fff1;color:var(--dim)">나</span>':''}`;
    list.appendChild(el);
  });
}

function renderHostRoleGrid(){
  const total=Object.values(S.roles).reduce((a,b)=>a+b,0);
  const grid=document.getElementById('host-role-grid'); grid.innerHTML='';
  ['마피아','의사','경찰','시민'].forEach(role=>{
    const cfg=ROLE_CFG[role]; const el=document.createElement('div'); el.className='role-cell';
    el.innerHTML=`<div class="role-cell-lbl"><span class="dot" style="background:${cfg.color}"></span><span>${cfg.emoji} ${role}</span></div><div class="role-adj"><button class="adj-btn" data-role="${role}" data-d="-1">−</button><span class="adj-num" id="rn-${role}">${S.roles[role]||0}</span><button class="adj-btn" data-role="${role}" data-d="1">＋</button></div>`;
    grid.appendChild(el);
  });
  const n=parseInt(document.getElementById('wait-count').textContent)||0;
  const diff=total-n; const msg=document.getElementById('host-role-msg');
  if(diff===0){msg.style.color='var(--success)';msg.textContent=`✅ 합계 ${total}명 일치`;}
  else{msg.style.color='var(--accent)';msg.textContent=`⚠️ 합계 ${total}명 / 참가자 ${n}명 (${Math.abs(diff)}명 ${diff>0?'초과':'부족'})`;}
}

document.getElementById('host-role-grid').addEventListener('click',e=>{
  const btn=e.target.closest('[data-role]'); if(!btn) return;
  const role=btn.dataset.role; const next=(S.roles[role]||0)+Number(btn.dataset.d);
  if(next<0) return; S.roles[role]=next; renderHostRoleGrid();
  update(ref(db,`rooms/${S.roomCode}`),{roles:S.roles});
});

document.getElementById('btn-game-start').addEventListener('click',async()=>{
  const snap=await get(ref(db,`rooms/${S.roomCode}/players`)); if(!snap.exists()) return;
  const players=snap.val(); const n=Object.keys(players).length;
  const total=Object.values(S.roles).reduce((a,b)=>a+b,0);
  if(total!==n){alert(`역할 합계(${total})가 인원수(${n})와 맞지 않습니다.`);return;}
  let roleArr=[]; Object.entries(S.roles).forEach(([role,cnt])=>{for(let i=0;i<cnt;i++) roleArr.push(role);});
  for(let i=roleArr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[roleArr[i],roleArr[j]]=[roleArr[j],roleArr[i]];}
  const sorted=Object.keys(players).sort((a,b)=>players[a].order-players[b].order);
  const upd={}; sorted.forEach((id,i)=>{upd[`rooms/${S.roomCode}/players/${id}/role`]=roleArr[i];});
  upd[`rooms/${S.roomCode}/status`]='started';
  upd[`rooms/${S.roomCode}/phase`]='day';
  upd[`rooms/${S.roomCode}/dayPhase`]='voting';
  upd[`rooms/${S.roomCode}/round`]=1;
  await update(ref(db),upd);
});

// ── GAME ──────────────────────────────────────────────────────────────────────
let gameListeners=[];
function clearGameListeners(){ gameListeners.forEach(fn=>fn()); gameListeners=[]; }
function gameListen(r,cb){ onValue(r,cb); gameListeners.push(()=>off(r,'value',cb)); }

async function enterGame(){
  clearListeners(); page('p-game'); timerReset(); _prevRoomJSON='';
  gameListen(ref(db,`rooms/${S.roomCode}`),snap=>{
    if(!snap.exists()) return;
    const room=snap.val();
    const json=JSON.stringify({phase:room.phase,dayPhase:room.dayPhase,round:room.round,nightActions:room.nightActions,nightMafiaVotes:room.nightMafiaVotes,votes:room.votes,executeVotes:room.executeVotes,finalist:room.finalist,players:room.players,nightResult:room.nightResult});
    if(json===_prevRoomJSON) return;
    _prevRoomJSON=json;
    if(room.status==='ended'){showWin(room);return;}
    renderGameState(room);
  });
}

function renderGameState(room){
  const phase=room.phase||'day'; const round=room.round||1;
  document.getElementById('g-phase-icon').textContent=phase==='night'?'🌙':'☀️';
  const lbl=document.getElementById('g-phase-lbl');
  lbl.textContent=phase==='night'?'밤':(phase==='night_result'?'새벽':'낮');
  lbl.className='phase-lbl '+(phase==='day'?'day-clr':'night-clr');
  document.getElementById('g-round-lbl').textContent=`${round}번째`;
  document.getElementById('g-scroll').scrollTop=0;

  if(phase==='night') renderNight(room);
  else if(phase==='night_result') renderNightResult(room);
  else renderDay(room);
}

// ── NIGHT ─────────────────────────────────────────────────────────────────────
function renderNight(room){
  const players=room.players||{};
  const myAction=(room.nightActions||{})[S.playerId];
  const cfg=ROLE_CFG[S.myRole]||ROLE_CFG['시민'];
  let html='';

  if(myAction!==undefined){
    html=`<div class="guide"><strong>${cfg.emoji} 행동 완료</strong><br><br>다른 플레이어들의 행동을 기다리는 중입니다<span class="waiting-dot">.</span><span class="waiting-dot">.</span><span class="waiting-dot">.</span></div>`;
    document.getElementById('g-content').innerHTML=html;
    if(S.isHost) checkNightDone(room);
    return;
  }

  if(S.myRole==='시민'){
    document.getElementById('g-content').innerHTML=`<div class="guide"><strong>👤 시민</strong><br><br>눈을 감고 기다리세요.</div><div class="result-box">기다리는 중<span class="waiting-dot">.</span><span class="waiting-dot">.</span><span class="waiting-dot">.</span></div>`;
    update(ref(db,`rooms/${S.roomCode}/nightActions/${S.playerId}`),{role:'시민',target:null});
    if(S.isHost) checkNightDone(room);
    return;
  }

  const alive=Object.entries(players).filter(([,p])=>p.alive);
  const content=document.getElementById('g-content');
  content.innerHTML='';

  if(S.myRole==='마피아'){
    renderMafiaUI(room, alive, cfg, content);
  } else if(S.myRole==='의사'){
    renderDoctorUI(room, alive, cfg, content);
  } else if(S.myRole==='경찰'){
    renderPoliceUI(room, alive, cfg, content);
  }
}

function renderMafiaUI(room, alive, cfg, content){
  const mafiaVotes=room.nightMafiaVotes||{};
  const players=room.players||{};
  // 내 마피아 동료 목록
  const mafiaIds=Object.entries(players).filter(([,p])=>p.alive&&p.role==='마피아').map(([id])=>id);
  const myVote=mafiaVotes[S.playerId];

  // 동료들의 투표 현황 표시 (마피아들끼리만)
  const voteSummary=mafiaIds.map(id=>{
    const target=mafiaVotes[id];
    const targetName=target&&players[target]?players[target].nick:'미선택';
    const isMe=id===S.playerId;
    return `${players[id]?.nick||'?'}${isMe?' (나)':''}: ${targetName}`;
  }).join('<br>');

  // 모두 동일한 대상 선택했는지
  const allVoted=mafiaIds.every(id=>mafiaVotes[id]!==undefined);
  const targetSet=new Set(Object.values(mafiaVotes));
  const consensus=allVoted&&targetSet.size===1;

  const guideEl=document.createElement('div'); guideEl.className='guide';
  guideEl.innerHTML=`<strong>🔪 마피아 — 처형 합의</strong><br><br>${cfg.desc}`;
  content.appendChild(guideEl);

  if(mafiaIds.length>1){
    const c=document.createElement('div'); c.className='mafia-consensus';
    c.innerHTML=`<strong style="color:var(--mafia)">동료 마피아 투표 현황</strong><br>${voteSummary}${consensus?`<br><br><strong style="color:var(--success)">✅ 합의 완료!</strong>`:allVoted?`<br><br><strong style="color:var(--warn)">⚠️ 의견 불일치 — 다시 선택하세요</strong>`:''}`;
    content.appendChild(c);
  }

  const grid=document.createElement('div'); grid.className='sel-grid';
  let selected=myVote||null;

  alive.forEach(([id,p])=>{
    if(p.role==='마피아') return;
    const btn=document.createElement('button'); btn.className='sel-btn';
    btn.textContent=p.name||p.nick;
    if(selected===id){btn.classList.add('picked');btn.style.cssText=`background:${cfg.color};border-color:${cfg.color};color:#fff`;}
    btn.addEventListener('click',()=>{
      grid.querySelectorAll('.sel-btn').forEach(b=>{b.classList.remove('picked');b.style.background='';b.style.borderColor='var(--border)';b.style.color='var(--dim)';});
      btn.classList.add('picked'); btn.style.cssText=`background:${cfg.color};border-color:${cfg.color};color:#fff`;
      selected=id;
      update(ref(db,`rooms/${S.roomCode}/nightMafiaVotes/${S.playerId}`),{[S.playerId]:id});
      confirmBtn.disabled=false;
    });
    grid.appendChild(btn);
  });
  content.appendChild(grid);

  const confirmBtn=document.createElement('button'); confirmBtn.className='confirm-btn';
  confirmBtn.style.background=cfg.color; confirmBtn.textContent='🔪 처형 확정';
  confirmBtn.disabled=!consensus&&mafiaIds.length>1||!selected;
  confirmBtn.addEventListener('click',async()=>{
    if(!selected) return;
    confirmBtn.disabled=true;
    await update(ref(db,`rooms/${S.roomCode}/nightActions/${S.playerId}`),{role:'마피아',target:selected});
    if(S.isHost) checkNightDone(room);
  });
  content.appendChild(confirmBtn);

  if(!consensus&&allVoted&&mafiaIds.length>1){
    // 불일치 시 초기화
    update(ref(db,`rooms/${S.roomCode}/nightMafiaVotes`),null);
  }
}

function renderPoliceUI(room, alive, cfg, content){
  const guide=document.createElement('div'); guide.className='guide';

  content.appendChild(guide);

async function checkNightDone(room){
  const snap=await get(ref(db,`rooms/${S.roomCode}`)); if(!snap.exists()) return;
  const r=snap.val(); const players=r.players||{}; const actions=r.nightActions||{};
  const alive=Object.keys(players).filter(id=>players[id].alive);
  if(!alive.every(id=>actions[id]!==undefined)) return;

  const mafiaAction=Object.values(actions).find(a=>a.role==='마피아');
  const doctorAction=Object.values(actions).find(a=>a.role==='의사');
  const mafiaTarget=mafiaAction?.target||null;
  const doctorTarget=doctorAction?.target||null;
  const killed=mafiaTarget&&mafiaTarget!==doctorTarget?mafiaTarget:null;
  const saved=!!mafiaTarget&&mafiaTarget===doctorTarget;

  const upd={};
  if(killed) upd[`rooms/${S.roomCode}/players/${killed}/alive`]=false;
  upd[`rooms/${S.roomCode}/nightResult`]={killed,saved};
  upd[`rooms/${S.roomCode}/nightActions`]=null;
  upd[`rooms/${S.roomCode}/nightMafiaVotes`]=null;
  upd[`rooms/${S.roomCode}/phase`]='night_result';
  await update(ref(db),upd);
}

// ── NIGHT RESULT ──────────────────────────────────────────────────────────────
function renderNightResult(room){
  const nr=room.nightResult||{};
  const players=room.players||{};
  let html='<div style="text-align:center;padding:30px 0">';
  html+='<div style="font-size:13px;color:var(--dim);margin-bottom:16px;font-weight:600;letter-spacing:1px">🌙 새벽 — 어젯밤 결과</div>';

  if(nr.killed){
    const v=players[nr.killed];
    html+=`<div style="font-size:64px;margin-bottom:12px">💀</div>`;
    html+=`<div style="font-size:22px;font-weight:900;color:var(--mafia);margin-bottom:8px">${esc(v?.nick||'?')}이(가) 처형되었습니다</div>`;
    html+=`<div class="dim" style="font-size:13px">마피아에 의해 처형되었습니다</div>`;
  } else if(nr.saved){
    html+=`<div style="font-size:64px;margin-bottom:12px">💉</div>`;
    html+=`<div style="font-size:22px;font-weight:900;color:var(--doctor);margin-bottom:8px">아무도 죽지 않았습니다</div>`;
    html+=`<div class="dim" style="font-size:13px">의사가 처형 대상을 구했습니다</div>`;
  } else {
    html+=`<div style="font-size:64px;margin-bottom:12px">🌙</div>`;
    html+=`<div style="font-size:22px;font-weight:900;margin-bottom:8px">아무도 죽지 않았습니다</div>`;
  }
  html+='</div>';

  if(S.isHost){
    html+=`<button class="btn btn-ghost" id="btn-to-day" style="margin-top:8px">☀️ 낮으로 넘어가기</button>`;
  } else {
    html+=`<div class="result-box">방장이 낮으로 넘기길 기다리는 중<span class="waiting-dot">.</span><span class="waiting-dot">.</span><span class="waiting-dot">.</span></div>`;
  }

  document.getElementById('g-content').innerHTML=html;

  if(S.isHost){
    document.getElementById('btn-to-day').addEventListener('click',async()=>{
      // 승패 체크
      const alive=Object.entries(players).filter(([,p])=>p.alive);
      const aM=alive.filter(([,p])=>p.role==='마피아').length;
      const aC=alive.filter(([,p])=>p.role!=='마피아').length;
      if(aM===0){await endGame(room,'citizen');return;}
      if(aM>=aC){await endGame(room,'mafia');return;}
      await update(ref(db,`rooms/${S.roomCode}`),{phase:'day',dayPhase:'voting',nightResult:room.nightResult,votes:null,executeVotes:null,finalist:null,round:(room.round||1)+1});
      timerReset();
    });
  }
}

// ── DAY ───────────────────────────────────────────────────────────────────────
function renderDay(room){
  const dayPhase=room.dayPhase||'voting';
  if(dayPhase==='voting'||dayPhase==='revote') renderVoting(room);
  else if(dayPhase==='result') renderVoteResult(room);
  else if(dayPhase==='execute') renderExecuteVote(room);
}

function renderVoting(room){
  const players=room.players||{};
  const votes=room.votes||{};
  const alive=Object.entries(players).filter(([,p])=>p.alive);
  const isRevote=room.dayPhase==='revote';
  const candidates=isRevote?(room.revoteCandidates||[]):alive.map(([id])=>id);
  const myVote=votes[S.playerId];
  const me=players[S.playerId];
  const canVote=me?.alive;

  let html='';

  // 밤 결과 (round>2)
  if(room.nightResult&&room.round>2){
    const nr=room.nightResult;
    if(nr.killed){const v=players[nr.killed]; html+=`<div class="announce kill"><div style="font-size:12px;color:var(--dim);margin-bottom:6px">🌙 어젯밤 결과</div><div style="font-size:16px;font-weight:800;color:var(--mafia)">🔪 ${esc(v?.nick||'?')}이(가) 처형되었습니다</div></div>`;}
    else if(nr.saved) html+=`<div class="announce save"><div style="font-size:12px;color:var(--dim);margin-bottom:6px">🌙 어젯밤 결과</div><div style="font-size:16px;font-weight:800;color:var(--doctor)">💉 아무도 죽지 않았습니다 (의사가 구함)</div></div>`;
    else html+=`<div class="announce none"><div style="font-size:12px;color:var(--dim);margin-bottom:6px">🌙 어젯밤 결과</div><div style="font-size:16px;font-weight:800">아무도 죽지 않았습니다</div></div>`;
  }

  html+=`<div class="timer-wrap"><div><div class="t-lbl">토론 타이머</div><div class="t-disp" id="t-disp">05:00</div></div><div class="t-btns"><button class="t-btn t-start" id="t-start-btn" onclick="timerToggle()">시작</button><button class="t-btn" onclick="timerReset()">리셋</button></div></div>`;

  html+=`<div class="card"><div class="card-title">${isRevote?'🔄 재투표':'🗳️ 처형 투표'}</div><div class="dim" style="font-size:12px;margin-bottom:10px">${isRevote?'동수로 재투표합니다. 처형할 플레이어에게 투표하세요.':'처형할 플레이어에게 투표하세요. 투표 결과는 종료 후 공개됩니다.'}</div><div class="vote-grid" id="vote-grid">`;

  candidates.forEach(id=>{
    if(!players[id]?.alive) return;
    const p=players[id];
    const isMyVote=myVote===id;
    html+=`<button class="vote-btn${isMyVote?' my-vote':''}" data-id="${id}" ${!canVote?'disabled':''}>${esc(p.nick)}${isMyVote?'<br><span style="font-size:11px;color:var(--accent)">✓ 투표함</span>':''}</button>`;
  });
  html+=`</div>`;
  const voteCount=Object.keys(votes).length;
  const totalVoters=alive.length;
  html+=`<div style="text-align:center;font-size:13px;color:var(--dim);margin-top:10px">${voteCount}/${totalVoters}명 투표 완료</div></div>`;

  // 생존자
  html+=renderSurvivorListHTML(players);

  document.getElementById('g-content').innerHTML=html;
  updateTimerDisp();

  // 투표 버튼 이벤트
  document.querySelectorAll('#vote-grid .vote-btn').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const id=btn.dataset.id;
      if(myVote===id) await remove(ref(db,`rooms/${S.roomCode}/votes/${S.playerId}`));
      else await update(ref(db,`rooms/${S.roomCode}/votes`),{[S.playerId]:id});
    });
  });

  // 방장: 투표 완료 체크
  if(S.isHost) checkVoteDone(room);
}

async function checkVoteDone(room){
  const snap=await get(ref(db,`rooms/${S.roomCode}`)); if(!snap.exists()) return;
  const r=snap.val(); const players=r.players||{}; const votes=r.votes||{};
  const alive=Object.entries(players).filter(([,p])=>p.alive);
  if(Object.keys(votes).length<alive.length) return;

  // 집계
  const tally={};
  Object.values(votes).forEach(id=>{tally[id]=(tally[id]||0)+1;});
  const max=Math.max(...Object.values(tally));
  const topIds=Object.keys(tally).filter(id=>tally[id]===max);

  const isRevote=r.dayPhase==='revote';
  if(topIds.length>1){
    if(isRevote){
      // 재투표도 동수 → 아무도 처형 안 함
      await update(ref(db,`rooms/${S.roomCode}`),{dayPhase:'result',finalist:null,votes:r.votes});
    } else {
      // 재투표
      await update(ref(db,`rooms/${S.roomCode}`),{dayPhase:'revote',revoteCandidates:topIds,votes:null});
    }
  } else {
    await update(ref(db,`rooms/${S.roomCode}`),{dayPhase:'result',finalist:topIds[0],votes:r.votes});
  }
}

function renderVoteResult(room){
  const players=room.players||{};
  const votes=room.votes||{};
  const finalist=room.finalist;

  let html=`<div class="card"><div class="card-title">📊 투표 결과 공개</div>`;

  // 누가 누구에게 투표했는지
  const alive=Object.entries(players).filter(([,p])=>p.alive);
  alive.forEach(([id,p])=>{
    const targetId=votes[id];
    const target=targetId?players[targetId]:null;
    html+=`<div class="vote-row"><span style="font-weight:700;flex:1">${esc(p.nick)}</span><span style="color:var(--dim);font-size:12px">→</span><span style="font-weight:700;color:${target?'var(--accent)':'var(--dim)'};">${target?esc(target.nick):'기권'}</span></div>`;
  });
  html+='</div>';

  if(finalist){
    const f=players[finalist];
    html+=`<div class="announce kill" style="margin-bottom:12px"><div style="font-size:13px;color:var(--dim);margin-bottom:8px">최다 득표자</div><div style="font-size:22px;font-weight:900;color:var(--mafia)">${esc(f?.nick||'?')}</div></div>`;
    if(S.isHost){
      html+=`<button class="btn btn-red" id="btn-to-execute">⚖️ 처형 여부 투표 시작</button>`;
    } else {
      html+=`<div class="result-box">방장이 처형 여부 투표를 시작하길 기다리는 중<span class="waiting-dot">.</span><span class="waiting-dot">.</span><span class="waiting-dot">.</span></div>`;
    }
  } else {
    html+=`<div class="announce none"><div style="font-size:16px;font-weight:800">동수 — 처형 없이 밤으로</div></div>`;
    if(S.isHost) html+=`<button class="btn btn-ghost" id="btn-no-exec-night">🌙 밤으로 넘어가기</button>`;
  }

  document.getElementById('g-content').innerHTML=html;

  if(S.isHost){
    if(finalist) document.getElementById('btn-to-execute')?.addEventListener('click',async()=>{
      await update(ref(db,`rooms/${S.roomCode}`),{dayPhase:'execute',executeVotes:null});
    });
    document.getElementById('btn-no-exec-night')?.addEventListener('click',async()=>{
      await update(ref(db,`rooms/${S.roomCode}`),{phase:'night',dayPhase:null,votes:null,executeVotes:null,finalist:null});
    });
  }
}

function renderExecuteVote(room){
  const players=room.players||{};
  const finalist=room.finalist;
  const f=players[finalist];
  const execVotes=room.executeVotes||{};
  const myVote=execVotes[S.playerId];
  const me=players[S.playerId];
  const canVote=me?.alive;
  const alive=Object.entries(players).filter(([,p])=>p.alive);

  const yesCount=Object.values(execVotes).filter(v=>v==='yes').length;
  const noCount=Object.values(execVotes).filter(v=>v==='no').length;
  const totalVoted=Object.keys(execVotes).length;

  let html=`<div class="card"><div class="card-title">⚖️ 처형 여부 투표</div>`;
  html+=`<div style="text-align:center;margin-bottom:16px"><div style="font-size:13px;color:var(--dim);margin-bottom:6px">처형 대상</div><div style="font-size:22px;font-weight:900;color:var(--mafia)">${esc(f?.nick||'?')}</div></div>`;
  html+=`<div class="exec-grid">`;
  html+=`<button class="exec-btn yes${myVote==='yes'?' picked':''}" data-v="yes" ${!canVote?'disabled':''}>🔪 처형</button>`;
  html+=`<button class="exec-btn no${myVote==='no'?' picked':''}" data-v="no" ${!canVote?'disabled':''}>🛡️ 무죄</button>`;
  html+=`</div><div style="text-align:center;font-size:13px;color:var(--dim);margin-top:8px">${totalVoted}/${alive.length}명 투표 완료</div></div>`;

  document.getElementById('g-content').innerHTML=html;

  document.querySelectorAll('.exec-btn').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      await update(ref(db,`rooms/${S.roomCode}/executeVotes`),{[S.playerId]:btn.dataset.v});
    });
  });

  // 방장: 완료 체크
  if(S.isHost&&totalVoted>=alive.length){
    setTimeout(()=>resolveExecuteVote(room),500);
  }
}

async function resolveExecuteVote(room){
  const snap=await get(ref(db,`rooms/${S.roomCode}`)); if(!snap.exists()) return;
  const r=snap.val(); const execVotes=r.executeVotes||{};
  const yes=Object.values(execVotes).filter(v=>v==='yes').length;
  const no=Object.values(execVotes).filter(v=>v==='no').length;
  const execute=yes>no;
  const players=r.players||{};

  const upd={};
  if(execute){
    upd[`rooms/${S.roomCode}/players/${r.finalist}/alive`]=false;
  }
  upd[`rooms/${S.roomCode}/phase`]='night';
  upd[`rooms/${S.roomCode}/dayPhase`]=null;
  upd[`rooms/${S.roomCode}/votes`]=null;
  upd[`rooms/${S.roomCode}/executeVotes`]=null;
  upd[`rooms/${S.roomCode}/finalist`]=null;
  await update(ref(db),upd);

  // 처형 후 승패 체크
  if(execute){
    const updated={...players};
    if(updated[r.finalist]) updated[r.finalist].alive=false;
    const alive=Object.values(updated).filter(p=>p.alive);
    const aM=alive.filter(p=>p.role==='마피아').length;
    const aC=alive.filter(p=>p.role!=='마피아').length;
    if(aM===0) await endGame(r,'citizen');
    else if(aM>=aC) await endGame(r,'mafia');
  }
}

function renderSurvivorListHTML(players){
  const sorted=Object.values(players).sort((a,b)=>a.order-b.order);
  let html=`<div class="card"><div class="card-title">👥 생존자 현황</div>`;
  sorted.forEach(p=>{
    html+=`<div class="sv-item${p.alive?'':' dead'}"><span class="sv-name">${esc(p.nick)}</span>${!p.alive?'<span class="badge" style="background:#fff1;color:var(--dim)">탈락</span>':''}</div>`;
  });
  return html+'</div>';
}

// ── END GAME ──────────────────────────────────────────────────────────────────
async function endGame(room,winner){
  const snap=await get(ref(db,`rooms/${S.roomCode}/status`));
  if(snap.val()==='ended') return;
  await update(ref(db,`rooms/${S.roomCode}`),{status:'ended',winner});
}

function showWin(room){
  clearGameListeners(); timerStop();
  const winner=room.winner;
  document.getElementById('win-emoji').textContent=winner==='citizen'?'🎉':'🔪';
  const t=document.getElementById('win-title');
  t.textContent=winner==='citizen'?'시민 승리!':'마피아 승리!';
  t.style.color=winner==='citizen'?'var(--success)':'var(--accent)';
  document.getElementById('win-sub').textContent=winner==='citizen'?'마피아를 모두 처형했습니다!':'마피아가 마을을 장악했습니다!';
  const d=document.getElementById('win-roles');
  d.innerHTML='<div style="font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px">전체 역할 공개</div>';
  Object.entries(room.players||{}).sort((a,b)=>a[1].order-b[1].order).forEach(([id,p])=>{
    const cfg=ROLE_CFG[p.role||'시민'];
    const el=document.createElement('div'); el.className='sv-item'+(p.alive?'':' dead');
    el.innerHTML=`<span style="font-size:18px">${cfg.emoji}</span><span class="sv-name">${esc(p.nick)}${id===S.playerId?' (나)':''}</span><span style="font-size:13px;font-weight:800;color:${cfg.color}">${p.role||'?'}</span>${!p.alive?'<span class="badge" style="background:#fff1;color:var(--dim)">탈락</span>':''}`;
    d.appendChild(el);
  });
  page('p-win');
}

// ── TIMER ─────────────────────────────────────────────────────────────────────
function timerToggle(){ timer.running?timerStop():timerStart(); }
function timerStart(){
  if(timer.sec<=0) timerReset();
  timer.running=true;
  const btn=document.getElementById('t-start-btn');
  if(btn){btn.textContent='정지';btn.className='t-btn t-stop';}
  timer.iv=setInterval(()=>{ timer.sec--; updateTimerDisp(); if(timer.sec<=0){timerStop();const el=document.getElementById('t-disp');if(el)el.textContent='⏰ 종료!';} },1000);
}
function timerStop(){ timer.running=false; clearInterval(timer.iv); const btn=document.getElementById('t-start-btn'); if(btn){btn.textContent='시작';btn.className='t-btn t-start';} }
function timerReset(){ timerStop(); timer.sec=300; updateTimerDisp(); }
function updateTimerDisp(){
  const el=document.getElementById('t-disp'); if(!el) return;
  const m=Math.floor(timer.sec/60),s=timer.sec%60;
  el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.className='t-disp'+(timer.running?(timer.sec<=30?' t-urgent':' t-running'):'');
}

// ── RESET ─────────────────────────────────────────────────────────────────────
window.goLobby=function(){ clearListeners(); clearGameListeners(); timerStop(); S={nick:'',roomCode:'',playerId:'',isHost:false,myRole:'',roles:{마피아:2,의사:1,경찰:1,시민:3},listeners:[]}; document.getElementById('inp-nick').value=''; document.getElementById('inp-code').value=''; page('p-lobby'); };
window.timerToggle=timerToggle;
window.timerReset=timerReset;

// Input touch fix
document.querySelectorAll('.inp').forEach(el=>{ el.addEventListener('mousedown',e=>e.stopPropagation()); el.addEventListener('touchstart',e=>e.stopPropagation(),{passive:false}); });
</script>
